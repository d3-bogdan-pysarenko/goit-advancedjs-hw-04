<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HomeWork 3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/raphaelfabeni/css-loader@master/dist/css-loader.min.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <main>
      <div class="container">
        <h1 class="main-title">
          <span class="main-title-gradient">Homework_03</span>
          Advanced JavaScript and TypeScript: Tools and Best Practices 2.0
        </h1>

        <section class="search">
          <form class="form">
              <label class="label">
                  <input
                      type="text"
                      name="search-text"
                      placeholder="Search images..."
                      required
                  />
              </label>
              <button class="search-btn" type="submit">Search</button>
          </form>
        </section>

        <section class="container">
          <span class="loader loader-default"></span>
          <ul class="gallery"></ul>
        </section>

      </div>
    </main>
    <footer class="home-footer">
      Homework_03 for course Advanced JavaScript and TypeScript: Tools and
      Best Practices 2.0
    </footer>

    <script type="module" src="./main.js"></script>
  </body>
</html>
